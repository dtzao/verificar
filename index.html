<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atualizar Clientes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  padding:15px;
  background:#f5f5f5;
}

.bloco{
  background:white;
  border-radius:10px;
  padding:12px;
  margin-bottom:15px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  height:90px;
  border-radius:6px;
  border:1px solid #ccc;
  padding:5px;
}

button{
  margin-top:8px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.enviar{ background:#4CAF50; color:white; }
.excluir{ background:#f44336; color:white; }

.status{
  display:block;
  margin-top:5px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Atualizar Clientes</h2>
<div id="container"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz9_bqSoEo-j5lpKcohMhtkQdDxJiehoFZlprPt3DqkOuxHGKaBttmVWyE6Ic3T6Sd-/exec";

// 🔥 LOCAL STORAGE
function carregarLocal(){
  return JSON.parse(localStorage.getItem("dadosClientes") || "[]");
}

function salvarLocal(dados){
  localStorage.setItem("dadosClientes", JSON.stringify(dados));
}

let dados = carregarLocal();

// 🔥 CRIAR CAMPOS
for(let i=0;i<10;i++){
  const div = document.createElement("div");
  div.className = "bloco";

  div.innerHTML = `
    <textarea id="txt${i}" placeholder="Cole a mensagem..."></textarea>
    <button class="enviar" onclick="processar(${i})">Enviar</button>
    <button class="excluir" onclick="excluir(${i})">Excluir</button>
    <span id="status${i}" class="status"></span>
  `;

  document.getElementById("container").appendChild(div);

  if(dados[i]){
    document.getElementById("txt"+i).value = dados[i];
  }

  document.getElementById("txt"+i).addEventListener("input",()=>{
    dados[i] = document.getElementById("txt"+i).value;
    salvarLocal(dados);
  });
}

// 🔥 PROCESSAR ENVIO (VERSÃO REAL)
async function processar(i){
  const txt = document.getElementById("txt"+i).value;
  const status = document.getElementById("status"+i);

  const userMatch = txt.match(/usu[aá]rio\s*:\s*(.+)/i);
  const dataMatch = txt.match(/(\d{2}\/\d{2}\/\d{4})/);

  if(!userMatch || !dataMatch){
    status.textContent = "❌ Não identificou";
    status.style.color = "red";
    return;
  }

  const usuario = userMatch[1].trim();
  const data = dataMatch[1];

  status.textContent = "⏳ Enviando...";
  status.style.color = "orange";

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ usuario, data })
    });

    const texto = await res.text();

    status.textContent = texto;

    if(texto.includes("✅")){
      status.style.color = "green";
    }else{
      status.style.color = "red";
    }

  }catch(err){
    status.textContent = "❌ Falha de conexão";
    status.style.color = "red";
  }
}

// 🔥 EXCLUIR
function excluir(i){
  document.getElementById("txt"+i).value = "";
  document.getElementById("status"+i).textContent = "";

  dados[i] = "";
  salvarLocal(dados);
}
</script>

</body>
</html>
