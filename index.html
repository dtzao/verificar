<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atualizar Vencimentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  padding:20px;
}

.bloco{
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
}

textarea{
  width:100%;
  height:100px;
}

button{
  margin-top:5px;
  padding:6px 10px;
  margin-right:5px;
}

.status{
  margin-left:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>Atualizar Clientes</h2>

<div id="container"></div>

<!-- iframe invisível -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz9_bqSoEo-j5lpKcohMhtkQdDxJiehoFZlprPt3DqkOuxHGKaBttmVWyE6Ic3T6Sd-/exec";

// 🔥 LOCAL STORAGE
function carregarLocal(){
  return JSON.parse(localStorage.getItem("dadosClientes") || "[]");
}

function salvarLocal(dados){
  localStorage.setItem("dadosClientes", JSON.stringify(dados));
}

let dados = carregarLocal();

// 🔥 CRIA CAMPOS
for(let i=0;i<10;i++){
  const div = document.createElement("div");
  div.className = "bloco";

  div.innerHTML = `
    <textarea id="txt${i}" placeholder="Cole a mensagem aqui..."></textarea><br>
    <button onclick="processar(${i})">Enviar</button>
    <button onclick="excluir(${i})">🗑️ Excluir</button>
    <span id="status${i}" class="status"></span>
  `;

  document.getElementById("container").appendChild(div);

  if(dados[i]){
    document.getElementById("txt"+i).value = dados[i];
  }

  document.getElementById("txt"+i).addEventListener("input",()=>{
    dados[i] = document.getElementById("txt"+i).value;
    salvarLocal(dados);
  });
}

// 🔥 ENVIO SEM CORS (FUNCIONA EM TUDO)
function processar(i){
  const txt = document.getElementById("txt"+i).value;
  const status = document.getElementById("status"+i);

  const userMatch = txt.match(/Usuário:\s*(.+)/i);
  const dataMatch = txt.match(/(\d{2}\/\d{2}\/\d{4})/);

  if(!userMatch || !dataMatch){
    status.textContent = "❌ Erro ao identificar";
    status.style.color = "red";
    return;
  }

  const usuario = userMatch[1].trim();
  const data = dataMatch[1];

  status.textContent = "⏳ Enviando...";
  status.style.color = "orange";

  const form = document.createElement("form");
  form.method = "POST";
  form.action = API_URL;
  form.target = "hidden_iframe";

  const input1 = document.createElement("input");
  input1.name = "usuario";
  input1.value = usuario;

  const input2 = document.createElement("input");
  input2.name = "data";
  input2.value = data;

  form.appendChild(input1);
  form.appendChild(input2);

  document.body.appendChild(form);
  form.submit();

  status.textContent = "✅ Feito";
  status.style.color = "green";
}

// 🔥 EXCLUIR
function excluir(i){
  document.getElementById("txt"+i).value = "";
  document.getElementById("status"+i).textContent = "";

  dados[i] = "";
  salvarLocal(dados);
}
</script>

</body>
</html>
