<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atualizar Vencimentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  padding:20px;
}

.bloco{
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
}

textarea{
  width:100%;
  height:100px;
}

button{
  margin-top:5px;
  padding:6px 10px;
}

.status{
  margin-left:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>Atualizar Clientes</h2>

<div id="container"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz9_bqSoEo-j5lpKcohMhtkQdDxJiehoFZlprPt3DqkOuxHGKaBttmVWyE6Ic3T6Sd-/exec";

// cria 10 blocos automaticamente
for(let i=0;i<10;i++){
  const div = document.createElement("div");
  div.className = "bloco";

  div.innerHTML = `
    <textarea id="txt${i}" placeholder="Cole a mensagem aqui..."></textarea><br>
    <button onclick="processar(${i})">Enviar</button>
    <span id="status${i}" class="status"></span>
  `;

  document.getElementById("container").appendChild(div);
}

function processar(i){
  const txt = document.getElementById("txt"+i).value;
  const status = document.getElementById("status"+i);

  const userMatch = txt.match(/Usuário:\s*(.+)/i);
  const dataMatch = txt.match(/(\d{2}\/\d{2}\/\d{4})/);

  if(!userMatch || !dataMatch){
    status.textContent = "❌ Erro ao identificar";
    status.style.color = "red";
    return;
  }

  const usuario = userMatch[1].trim();
  const data = dataMatch[1];

  status.textContent = "⏳ Enviando...";
  status.style.color = "orange";

  fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({usuario,data})
  })
  .then(r=>r.text())
  .then(r=>{
    status.textContent = "✅ Feito";
    status.style.color = "green";
  })
  .catch(()=>{
    status.textContent = "❌ Erro ao enviar";
    status.style.color = "red";
  });
}
</script>

</body>
</html>
