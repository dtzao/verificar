<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atualizar Clientes</title>

<style>
body{
  font-family:Arial;
  padding:15px;
  background:#f2f2f2;
}

.bloco{
  background:white;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
}

textarea{
  width:100%;
  height:80px;
}

button{
  margin-top:5px;
  padding:6px;
}

.status{
  display:block;
  margin-top:5px;
  font-weight:bold;
}
</style>
</head>

<body>

<h3>Atualizar Clientes</h3>

<div id="container"></div>

<!-- 🔥 iframe invisível (segredo pra não sair da página) -->
<iframe name="oculto" style="display:none;"></iframe>

<script>
const API_URL = "COLE_SUA_URL_AQUI";

for(let i=0;i<5;i++){
  const div = document.createElement("div");
  div.className = "bloco";

  div.innerHTML = `
    <textarea id="txt${i}" placeholder="Cole a mensagem"></textarea>
    <form id="form${i}" method="POST" action="${API_URL}" target="oculto">
      <input type="hidden" name="usuario" id="user${i}">
      <input type="hidden" name="data" id="data${i}">
      <button type="button" onclick="enviar(${i})">Enviar</button>
    </form>
    <span id="status${i}" class="status"></span>
  `;

  document.getElementById("container").appendChild(div);
}

function enviar(i){
  const txt = document.getElementById("txt"+i).value;
  const status = document.getElementById("status"+i);

  const userMatch = txt.match(/usu[aá]rio\s*:\s*(.+)/i);
  const dataMatch = txt.match(/(\d{2}\/\d{2}\/\d{4})/);

  if(!userMatch || !dataMatch){
    status.textContent = "Erro ao identificar";
    status.style.color = "red";
    return;
  }

  const usuario = userMatch[1].trim();
  const data = dataMatch[1];

  document.getElementById("user"+i).value = usuario;
  document.getElementById("data"+i).value = data;

  status.textContent = "Enviando...";
  status.style.color = "orange";

  document.getElementById("form"+i).submit();

  // 🔥 feedback simples (funciona sempre)
  setTimeout(()=>{
    status.textContent = "Enviado ✔ (verifique planilha)";
    status.style.color = "green";
  },1000);
}
</script>

</body>
</html>
