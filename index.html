<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel</title>

<style>
body{
  font-family:Arial;
  padding:10px;
  background:#eee;
}

.box{
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

textarea{
  width:100%;
  height:80px;
}

button{
  margin-top:5px;
  padding:6px;
}

.ok{color:green;}
.erro{color:red;}
</style>
</head>

<body>

<h3>Atualizar</h3>

<div id="lista"></div>

<!-- iframe invisível -->
<iframe name="oculto" style="display:none;"></iframe>

<script>
const API = "COLE_SUA_URL_AQUI";

// 🔥 STORAGE
let dados = JSON.parse(localStorage.getItem("dados") || "[]");

// 🔥 FILA (garante envio no celular)
let fila = [];
let rodando = false;

// 🔥 CRIA 5 CAMPOS
for(let i=0;i<5;i++){
  criar(i);
}

function criar(i){
  const div = document.createElement("div");
  div.className="box";

  div.innerHTML = `
    <textarea id="t${i}"></textarea><br>
    <button onclick="enviar(${i})">Enviar</button>
    <button onclick="excluir(${i})">Excluir</button>
    <div id="s${i}"></div>

    <form id="f${i}" method="POST" action="${API}" target="oculto">
      <input name="usuario" id="u${i}">
      <input name="data" id="d${i}">
    </form>
  `;

  document.getElementById("lista").appendChild(div);

  if(dados[i]) document.getElementById("t"+i).value = dados[i];

  document.getElementById("t"+i).oninput = ()=>{
    dados[i] = document.getElementById("t"+i).value;
    localStorage.setItem("dados", JSON.stringify(dados));
  }
}

// 🔥 EXTRAI TEXTO
function extrair(txt){
  let u = txt.match(/usu[aá]rio\s*:\s*(.+)/i);
  let d = txt.match(/(\d{2}\/\d{2}\/\d{4})/);

  if(!u || !d) return null;

  return {
    usuario: u[1].trim(),
    data: d[1]
  };
}

// 🔥 ENVIA
function enviar(i){
  let txt = document.getElementById("t"+i).value;
  let s = document.getElementById("s"+i);

  let dados = extrair(txt);

  if(!dados){
    s.innerHTML = "<span class='erro'>Erro</span>";
    return;
  }

  fila.push({i,...dados});
  s.innerHTML = "Fila...";

  rodar();
}

// 🔥 PROCESSA FILA (ESSENCIAL PRA CELULAR)
function rodar(){
  if(rodando) return;

  rodando = true;

  function loop(){
    if(fila.length === 0){
      rodando=false;
      return;
    }

    let item = fila.shift();

    document.getElementById("u"+item.i).value = item.usuario;
    document.getElementById("d"+item.i).value = item.data;

    document.getElementById("s"+item.i).innerHTML="Enviando...";

    document.getElementById("f"+item.i).submit();

    setTimeout(()=>{
      document.getElementById("s"+item.i).innerHTML="<span class='ok'>Enviado</span>";
      loop();
    },1500); // tempo necessário no celular
  }

  loop();
}

// 🔥 EXCLUIR
function excluir(i){
  document.getElementById("t"+i).value="";
  document.getElementById("s"+i).innerHTML="";

  dados[i]="";
  localStorage.setItem("dados", JSON.stringify(dados));
}
</script>

</body>
</html>
